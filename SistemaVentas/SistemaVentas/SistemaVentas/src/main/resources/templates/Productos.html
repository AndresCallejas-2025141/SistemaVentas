<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f4f6f9;
  --primary:#10b981;
  --text:#1f2937;
  --border:#e5e7eb;
}

body{font-family:'Poppins';background:var(--bg);}

/* TOP */
.top{
  background:var(--primary);
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.btn-home{
  background:#ffffff;
  color:var(--primary);
  border:2px solid #ffffff;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
}

.btn-home:hover{
  background:#0f766e;
  color:#fff;
  border-color:#0f766e;
  transform:translateY(-1px);
}

.container{padding:20px;}

table{
  width:100%;
  background:#fff;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

tr:hover{background:#f9fafb;}

.form{
  margin-bottom:15px;
}

input{
  padding:8px;
  margin-right:5px;
  border:1px solid var(--border);
  border-radius:6px;
}
</style>
</head>

<body>

<div class="top">
  <h2>Productos</h2>
  <button class="btn-home" th:onclick="|window.location.href='@{/home}'|">Principal</button>
</div>

<div class="container">

<div class="form">
  <input id="codigoProducto" placeholder="Código">
  <input id="nombreProducto" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input id="stock" placeholder="Stock">
  <input id="estado" placeholder="Estado">
  <button class="btn" onclick="agregar()">Agregar</button>
  <button class="btn" onclick="editar()">Editar</button>
  <button class="btn" onclick="eliminar()">Eliminar</button>
  <button class="btn" onclick="actualizar()">Actualizar</button>
</div>

<table>
<thead>
<tr>
  <th>codigo_producto</th>
  <th>nombre_producto</th>
  <th>precio</th>
  <th>stock</th>
  <th>estado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

    let indexActual = null;

    // LISTAR
    async function render(){
      let res = await fetch("/api/productos");
      let data = await res.json();

      let tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data.forEach((p)=>{

        tabla.innerHTML += `
        <tr onclick="seleccionar(
          ${p.codigoProducto},
          '${p.nombreProducto}',
          ${p.precio},
          ${p.stock},
          '${p.estado}'
        )">
          <td>${p.codigoProducto}</td>
          <td>${p.nombreProducto}</td>
          <td>${p.precio}</td>
          <td>${p.stock}</td>
          <td>${p.estado}</td>
        </tr>`;
      });
    }

    // SELECCIONAR
    function seleccionar(codigoProducto, nombreProducto, precio, stock, estado){

      indexActual = codigoProducto;

      document.getElementById("codigoProducto").value = codigoProducto;
      document.getElementById("nombreProducto").value = nombreProducto;
      document.getElementById("precio").value = precio;
      document.getElementById("stock").value = stock;
      document.getElementById("estado").value = estado;
    }

    // LIMPIAR
    function limpiarFormulario(){
      document.getElementById("codigoProducto").value = "";
      document.getElementById("nombreProducto").value = "";
      document.getElementById("precio").value = "";
      document.getElementById("stock").value = "";
      document.getElementById("estado").value = "";
      indexActual = null;
    }

    // AGREGAR
    async function agregar(){

      let producto = {
        nombreProducto: document.getElementById("nombreProducto").value,
        precio: document.getElementById("precio").value,
        stock: document.getElementById("stock").value,
        estado: document.getElementById("estado").value
      };

      await fetch("/api/productos", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(producto)
      });

      render();
      limpiarFormulario();
    }

    // EDITAR
    async function editar(){

      if(indexActual == null){
        alert("Selecciona un producto");
        return;
      }

      let producto = {
        nombreProducto: document.getElementById("nombreProducto").value,
        precio: document.getElementById("precio").value,
        stock: document.getElementById("stock").value,
        estado: document.getElementById("estado").value
      };

      await fetch(`/api/productos/${indexActual}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(producto)
      });

      render();
      limpiarFormulario();
    }

    // ELIMINAR
    async function eliminar(){

      if(indexActual == null){
        alert("Selecciona un producto");
        return;
      }

      await fetch(`/api/productos/${indexActual}`, {
        method: "DELETE"
      });

      render();
      limpiarFormulario();
    }

    // ACTUALIZAR
    function actualizar(){
      render();
      limpiarFormulario();
    }

    // INICIAL
    render();

</script>
</body>
</html>
