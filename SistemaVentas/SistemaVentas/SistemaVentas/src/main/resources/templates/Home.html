<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio — SistemaVentas</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        :root{
          --bg:#f4f6f9;
          --primary:#10b981;
          --text:#1f2937;
          --text-light:#6b7280;
        }

        body{
          font-family:'Poppins',sans-serif;
          background:var(--bg);
        }

        /* TOP BAR */
        .top-bar{
          position:fixed;
          top:0;
          left:0;
          width:100%;
          height:100px;
          background:#10b981;
          display:flex;
          align-items:center;
          justify-content:space-between;
          padding:0 20px;
          color:#fff;
          z-index:10;
        }

        .left-info{
          display:flex;
          flex-direction:column;
          gap:4px;
        }

        .user-info{
          font-size:20px;
        }

        .role{
          font-size:15px;
          opacity:0.9;
        }

        .user-photo{
          width:50px;
          height:50px;
          border-radius:45%;
          object-fit:cover;
          margin-left:10px;
          border:2px solid #fff;
        }

        .right-actions{
          display:flex;
          align-items:center;
          gap:15px;
        }

        .logout{
          background:#fff;
          color:#10b981;
          border:none;
          padding:8px 14px;
          border-radius:8px;
          cursor:pointer;
          font-weight:600;
          font-size:13px;
          text-decoration:none;
        }

        .logout:hover{
          background:#f3f4f6;
        }

        /* HEADER */
        .header{
          padding:120px 25px 25px;
          text-align:center;
        }

        .header h1{
          color:var(--text);
        }

        .grid{
          display:grid;
          grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
          gap:20px;
          padding:30px;
        }

        .card{
          position:relative;
          border-radius:20px;
          overflow:hidden;
          cursor:pointer;
          height:180px;
          transition:transform .2s, box-shadow .2s;
          display:block;
          text-decoration:none;
        }

        .card:hover{
          transform:translateY(-5px);
          box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        .card img{
          width:100%;
          height:100%;
          object-fit:cover;
        }

        .overlay{
          position:absolute;
          inset:0;
          background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
          display:flex;
          align-items:flex-end;
          padding:15px;
        }

        .overlay h3{
          color:#fff;
          font-size:18px;
        }

        @media(max-width:600px){
          .card{height:150px;}
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">

    <!-- IZQUIERDA -->
    <div class="left-info">
        <div class="user-info">
            Bienvenido,
            <strong th:text="${session.usuarioLogueado}">Usuario</strong>
        </div>

        <div class="role">
            Rol: <span th:text="${session.rol}">ROL</span>
        </div>
    </div>

    <!-- DERECHA -->
    <div class="right-actions">

        <!-- FOTO SEGÚN ROL -->
        <img th:if="${session.rol == 'administrador'}"
             th:src="@{/img/admin.jpg}"
             class="user-photo">

        <img th:if="${session.rol == 'cliente'}"
             th:src="@{/img/cliente.png}"
             class="user-photo">


        <!-- LOGOUT REAL -->
        <a th:href="@{/login}" class="logout">Cerrar sesión</a>

    </div>

</div>

<div class="header"></div>

<div class="grid">

    <a th:href="@{/ventas}" class="card">
        <img src="https://th.bing.com/th/id/R.0ff67b2000b31398a199151cbd186f0d?rik=Vum4kUA8IZQejw&pid=ImgRaw&r=0">
        <div class="overlay"><h3>Ventas</h3></div>
    </a>

    <a th:href="@{/detalleventas}" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/14931/14931813.png">
        <div class="overlay"><h3>Detalles de Ventas</h3></div>
    </a>

    <a th:href="@{/productos}" class="card">
        <img src="https://www.dobleclic.com/wp-content/uploads/2011/04/logotipos.png">
        <div class="overlay"><h3>Productos</h3></div>
    </a>

    <a th:href="@{/clientes}" class="card">
        <img src="https://static.vecteezy.com/system/resources/previews/022/772/596/non_2x/business-people-icon-editable-eps-symbol-illustration-vector.jpg">
        <div class="overlay"><h3>Clientes</h3></div>
    </a>

    <a th:href="@{/usuarios}" class="card">
        <img src="https://tse3.mm.bing.net/th/id/OIP.w2McZSq-EYWxh02iSvC3xwHaHa">
        <div class="overlay"><h3>Usuarios</h3></div>
    </a>

</div>

</body>
</html>
