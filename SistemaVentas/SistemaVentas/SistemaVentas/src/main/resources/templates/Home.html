<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio — SistemaVentas</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg: #0f172a;
    --primary: #10b981;
    --primary-dark: #059669;
    --text: #f8fafc;
    --text-light: #94a3b8;
    --card: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.15);
}

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color: var(--text);
}

/* TOP BAR */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 85px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 25px;

    background: rgba(16,185,129,0.12);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);

    z-index: 10;

    animation: slideDown 0.6s ease;
}

/* USUARIO INFO */
.left-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.user-info {
    font-size: 16px;
    font-weight: 600;
}

.role {
    font-size: 13px;
    color: var(--text-light);
}

/* FOTO USUARIO */
.user-photo {
    width: 48px;
    height: 48px;
    border-radius: 50%;

    object-fit: cover;

    border: 2px solid var(--primary);
    box-shadow: 0 0 15px rgba(16,185,129,0.4);

    transition: 0.3s ease;
}

.user-photo:hover {
    transform: scale(1.08);
}

/* DERECHA */
.right-actions {
    display: flex;
    align-items: center;
    gap: 15px;
}

/* LOGOUT */
.logout {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;

    padding: 9px 16px;
    border-radius: 10px;

    font-size: 13px;
    font-weight: 600;

    text-decoration: none;
    border: none;

    transition: all 0.3s ease;
}

.logout:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(16,185,129,0.3);
}

/* HEADER */
.header {
    padding: 110px 25px 10px;
    text-align: center;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 22px;
    padding: 30px;
}

/* CARD */
.card {
    position: relative;
    height: 190px;

    border-radius: 18px;
    overflow: hidden;

    display: block;
    text-decoration: none;

    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);

    cursor: pointer;

    transition: all 0.3s ease;

    animation: fadeUp 0.6s ease;
}

.card:hover {
    transform: translateY(-7px) scale(1.02);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    border-color: var(--primary);
}

/* IMAGEN */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;

    filter: brightness(0.85);
    transition: 0.4s ease;
}

.card:hover img {
    transform: scale(1.06);
    filter: brightness(0.6);
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;

    background: linear-gradient(
        to top,
        rgba(0,0,0,0.75),
        transparent
    );

    display: flex;
    align-items: flex-end;

    padding: 15px;
}

.overlay h3 {
    font-size: 16px;
    font-weight: 600;
    color: white;
}

/* ANIMACIONES */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .card {
        height: 150px;
    }

    .top-bar {
        height: 75px;
    }
}
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">

    <!-- IZQUIERDA -->
    <div class="left-info">
        <div class="user-info">
            Bienvenido,
            <strong th:text="${session.usuarioLogueado}">Usuario</strong>
        </div>

        <div class="role">
            Rol: <span th:text="${session.rol}">ROL</span>
        </div>
    </div>

    <!-- DERECHA -->
    <div class="right-actions">

        <!-- FOTO SEGÚN ROL -->
        <img th:if="${session.rol == 'administrador'}"
             th:src="@{/img/admin.jpg}"
             class="user-photo">

        <img th:if="${session.rol == 'cliente'}"
             th:src="@{/img/cliente.png}"
             class="user-photo">


        <!-- LOGOUT REAL -->
        <a th:href="@{/login}" class="logout">Cerrar sesión</a>

    </div>

</div>

<div class="header"></div>

<div class="grid">

    <a th:href="@{/ventas}" class="card">
        <img src="https://th.bing.com/th/id/R.0ff67b2000b31398a199151cbd186f0d?rik=Vum4kUA8IZQejw&pid=ImgRaw&r=0">
        <div class="overlay"><h3>Ventas</h3></div>
    </a>

    <a th:href="@{/detalleventas}" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/14931/14931813.png">
        <div class="overlay"><h3>Detalles de Ventas</h3></div>
    </a>

    <a th:href="@{/productos}" class="card">
        <img src="https://www.dobleclic.com/wp-content/uploads/2011/04/logotipos.png">
        <div class="overlay"><h3>Productos</h3></div>
    </a>

    <a th:href="@{/clientes}" class="card" th:if="${session.rol == 'administrador'}">
        <img src="https://static.vecteezy.com/system/resources/previews/022/772/596/non_2x/business-people-icon-editable-eps-symbol-illustration-vector.jpg">
        <div class="overlay"><h3>Clientes</h3></div>
    </a>

    <a th:href="@{/usuarios}" class="card" th:if="${session.rol == 'administrador'}">
        <img src="https://tse3.mm.bing.net/th/id/OIP.w2McZSq-EYWxh02iSvC3xwHaHa">
        <div class="overlay"><h3>Usuarios</h3></div>
    </a>

</div>

</body>
</html>
