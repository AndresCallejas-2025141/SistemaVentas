<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DetalleVentas</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg: #0f172a;
        --primary: #10b981;
        --primary-dark: #059669;
        --text: #f8fafc;
        --text-light: #94a3b8;
        --card: rgba(255,255,255,0.08);
        --border: rgba(255,255,255,0.15);
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: radial-gradient(circle at top, #1e293b, #0f172a);
        color: var(--text);
    }

    /* TOP BAR */
    .top {
        position: sticky;
        top: 0;

        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 16px 20px;

        background: rgba(16,185,129,0.15);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.1);

        animation: slideDown 0.6s ease;
    }

    /* BOTONES */
    .btn {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;

        border: none;
        padding: 9px 14px;

        border-radius: 10px;

        cursor: pointer;
        margin-right: 6px;

        font-weight: 600;
        font-size: 13px;

        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(16,185,129,0.3);
    }

    /* HOME */
    .btn-home {
        background: transparent;
        color: var(--primary);

        border: 1px solid var(--primary);

        padding: 8px 14px;
        border-radius: 10px;

        font-weight: 600;
        cursor: pointer;

        transition: all 0.3s ease;
    }

    .btn-home:hover {
        background: var(--primary);
        color: white;

        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(16,185,129,0.3);
    }

    /* CONTENEDOR */
    .container {
        padding: 25px;
    }

    /* FORMULARIO */
    .form {
        margin-bottom: 20px;

        display: flex;
        flex-wrap: wrap;
        gap: 10px;

        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);

        padding: 15px;
        border-radius: 16px;

        animation: fadeUp 0.6s ease;
    }

    /* INPUTS */
    input {
        padding: 10px 12px;

        border-radius: 10px;
        border: 1px solid var(--border);

        background: rgba(255,255,255,0.05);
        color: var(--text);

        outline: none;

        transition: all 0.3s ease;
    }

    input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
        transform: translateY(-1px);
    }

    /* TABLA */
    table {
        width: 100%;

        border-collapse: collapse;

        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);

        border-radius: 16px;
        overflow: hidden;

        animation: fadeUp 0.8s ease;
    }

    /* HEADER TABLA */
    th {
        text-align: left;
        padding: 12px;

        font-size: 13px;
        color: var(--text-light);

        background: rgba(255,255,255,0.05);
    }

    /* CELDAS */
    td {
        padding: 12px;
        border-top: 1px solid rgba(255,255,255,0.05);

        font-size: 14px;
    }

    /* HOVER FILAS */
    tr {
        transition: all 0.2s ease;
        cursor: pointer;
    }

    tr:hover {
        background: rgba(16,185,129,0.08);
        transform: scale(1.01);
    }

    /* ANIMACIONES */
    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
        .form {
            flex-direction: column;
        }

        input {
            width: 100%;
        }
    }
</style>
</head>

<body>

<div class="top">
  <h2>Detalle de Ventas</h2>
  <button class="btn-home" th:onclick="|window.location.href='@{/home}'|">Principal</button>
</div>

<div class="container">

<div class="form">
  <input id="codigoDetalleVenta" placeholder="Código DV">
  <input id="cantidad" placeholder="Cantidad">
  <input id="precioUnitario" placeholder="Precio Unitario">
  <input id="subTotal" placeholder="Subtotal">
  <input id="codigoProducto" placeholder="Código del Producto">
  <input id="codigoVenta" placeholder="Código de Venta">
  <button class="btn" onclick="agregar()">Agregar</button>
  <button class="btn" onclick="editar()">Editar</button>
  <button class="btn" onclick="eliminar()">Eliminar</button>
  <button class="btn" onclick="actualizar()">Actualizar</button>
</div>

<table>
<thead>
<tr>
  <th>codigo_detalle_venta</th>
  <th>cantidad</th>
  <th>precio_unitario</th>
  <th>subtotal</th>
  <th>productos_codigo_producto</th>
  <th>ventas_codigo_venta</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

    let indexActual = null;

    // LISTAR
    async function render(){
      let res = await fetch("/api/detalleventa");
      let data = await res.json();

      let tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data.forEach((d)=>{

        let codigoProducto = d.codigoProducto ?? "";
        let codigoVenta = d.codigoVenta ?? "";

        tabla.innerHTML += `
        <tr onclick="seleccionar(
          ${d.codigoDetalleVenta},
          ${d.cantidad},
          ${d.precioUnitario},
          ${d.subtotal},
          ${codigoProducto},
          ${codigoVenta}
        )">
          <td>${d.codigoDetalleVenta}</td>
          <td>${d.cantidad}</td>
          <td>${d.precioUnitario}</td>
          <td>${d.subtotal}</td>
          <td>${codigoProducto}</td>
          <td>${codigoVenta}</td>
        </tr>`;
      });
    }

    // SELECCIONAR
    function seleccionar(id, cantidad, precioUnitario, subtotal, codigoProducto, codigoVenta){

      indexActual = id;

      document.getElementById("codigoDetalleVenta").value = id;
      document.getElementById("cantidad").value = cantidad;
      document.getElementById("precioUnitario").value = precioUnitario;
      document.getElementById("subTotal").value = subtotal;
      document.getElementById("codigoProducto").value = codigoProducto;
      document.getElementById("codigoVenta").value = codigoVenta;
    }

    // LIMPIAR
    function limpiarFormulario(){
      document.getElementById("codigoDetalleVenta").value = "";
      document.getElementById("cantidad").value = "";
      document.getElementById("precioUnitario").value = "";
      document.getElementById("subTotal").value = "";
      document.getElementById("codigoProducto").value = "";
      document.getElementById("codigoVenta").value = "";
      indexActual = null;
    }

    // AGREGAR (SIN ID)
    async function agregar(){

      let detalleVenta = {
        cantidad: document.getElementById("cantidad").value,
        precioUnitario: document.getElementById("precioUnitario").value,
        subtotal: document.getElementById("subTotal").value,
        codigoProducto: document.getElementById("codigoProducto").value,
        codigoVenta: document.getElementById("codigoVenta").value
      };

      await fetch("/api/detalleventa", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(detalleVenta)
      });

      render();
      limpiarFormulario();
    }

    // EDITAR (ID SOLO EN URL)
    async function editar(){

      if(indexActual == null){
        alert("Selecciona un registro");
        return;
      }

      let detalleVenta = {
        cantidad: document.getElementById("cantidad").value,
        precioUnitario: document.getElementById("precioUnitario").value,
        subtotal: document.getElementById("subTotal").value,
        codigoProducto: document.getElementById("codigoProducto").value,
        codigoVenta: document.getElementById("codigoVenta").value
      };

      await fetch(`/api/detalleventa/${indexActual}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(detalleVenta)
      });

      render();
      limpiarFormulario();
    }

    // ELIMINAR
    async function eliminar(){

      if(indexActual == null){
        alert("Selecciona un registro");
        return;
      }

      await fetch(`/api/detalleventa/${indexActual}`, {
        method: "DELETE"
      });

      render();
      limpiarFormulario();
    }

    // ACTUALIZAR
    function actualizar(){
      render();
      limpiarFormulario();
    }

    // INICIAL
    render();

</script>
</body>
</html>
