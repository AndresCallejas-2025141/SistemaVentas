<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DetalleVentas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f4f6f9;
  --primary:#10b981;
  --text:#1f2937;
  --border:#e5e7eb;
}

body{font-family:'Poppins';background:var(--bg);}

/* TOP */
.top{
  background:var(--primary);
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.btn-home{
  background:#ffffff;
  color:var(--primary);
  border:2px solid #ffffff;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
}

.btn-home:hover{
  background:#0f766e;
  color:#fff;
  border-color:#0f766e;
  transform:translateY(-1px);
}

.container{padding:20px;}

table{
  width:100%;
  background:#fff;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

tr:hover{background:#f9fafb;}

.form{
  margin-bottom:15px;
}

input{
  padding:8px;
  margin-right:5px;
  border:1px solid var(--border);
  border-radius:6px;
}
</style>
</head>

<body>

<div class="top">
  <h2>Detalle de Ventas</h2>
  <button class="btn-home" th:onclick="|window.location.href='@{/home}'|">Principal</button>
</div>

<div class="container">

<div class="form">
  <input id="codigoDetalleVenta" placeholder="Código DV">
  <input id="cantidad" placeholder="Cantidad">
  <input id="precioUnitario" placeholder="Precio Unitario">
  <input id="subTotal" placeholder="Subtotal">
  <input id="codigoProducto" placeholder="Código del Producto">
  <input id="codigoVenta" placeholder="Código de Venta">
  <button class="btn" onclick="agregar()">Agregar</button>
  <button class="btn" onclick="editar()">Editar</button>
  <button class="btn" onclick="eliminar()">Eliminar</button>
  <button class="btn" onclick="actualizar()">Actualizar</button>
</div>

<table>
<thead>
<tr>
  <th>codigo_detalle_venta</th>
  <th>cantidad</th>
  <th>precio_unitario</th>
  <th>subtotal</th>
  <th>productos_codigo_producto</th>
  <th>ventas_codigo_venta</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

    let indexActual = null;

    // LISTAR
    async function render(){
      let res = await fetch("/api/detalleventa");
      let data = await res.json();

      let tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data.forEach((d)=>{

        let codigoProducto = d.codigoProducto ?? "";
        let codigoVenta = d.codigoVenta ?? "";

        tabla.innerHTML += `
        <tr onclick="seleccionar(
          ${d.codigoDetalleVenta},
          ${d.cantidad},
          ${d.precioUnitario},
          ${d.subtotal},
          ${codigoProducto},
          ${codigoVenta}
        )">
          <td>${d.codigoDetalleVenta}</td>
          <td>${d.cantidad}</td>
          <td>${d.precioUnitario}</td>
          <td>${d.subtotal}</td>
          <td>${codigoProducto}</td>
          <td>${codigoVenta}</td>
        </tr>`;
      });
    }

    // SELECCIONAR
    function seleccionar(id, cantidad, precioUnitario, subtotal, codigoProducto, codigoVenta){

      indexActual = id;

      document.getElementById("codigoDetalleVenta").value = id;
      document.getElementById("cantidad").value = cantidad;
      document.getElementById("precioUnitario").value = precioUnitario;
      document.getElementById("subTotal").value = subtotal;
      document.getElementById("codigoProducto").value = codigoProducto;
      document.getElementById("codigoVenta").value = codigoVenta;
    }

    // LIMPIAR
    function limpiarFormulario(){
      document.getElementById("codigoDetalleVenta").value = "";
      document.getElementById("cantidad").value = "";
      document.getElementById("precioUnitario").value = "";
      document.getElementById("subTotal").value = "";
      document.getElementById("codigoProducto").value = "";
      document.getElementById("codigoVenta").value = "";
      indexActual = null;
    }

    // AGREGAR (SIN ID)
    async function agregar(){

      let detalleVenta = {
        cantidad: document.getElementById("cantidad").value,
        precioUnitario: document.getElementById("precioUnitario").value,
        subtotal: document.getElementById("subTotal").value,
        codigoProducto: document.getElementById("codigoProducto").value,
        codigoVenta: document.getElementById("codigoVenta").value
      };

      await fetch("/api/detalleventa", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(detalleVenta)
      });

      render();
      limpiarFormulario();
    }

    // EDITAR (ID SOLO EN URL)
    async function editar(){

      if(indexActual == null){
        alert("Selecciona un registro");
        return;
      }

      let detalleVenta = {
        cantidad: document.getElementById("cantidad").value,
        precioUnitario: document.getElementById("precioUnitario").value,
        subtotal: document.getElementById("subTotal").value,
        codigoProducto: document.getElementById("codigoProducto").value,
        codigoVenta: document.getElementById("codigoVenta").value
      };

      await fetch(`/api/detalleventa/${indexActual}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(detalleVenta)
      });

      render();
      limpiarFormulario();
    }

    // ELIMINAR
    async function eliminar(){

      if(indexActual == null){
        alert("Selecciona un registro");
        return;
      }

      await fetch(`/api/detalleventa/${indexActual}`, {
        method: "DELETE"
      });

      render();
      limpiarFormulario();
    }

    // ACTUALIZAR
    function actualizar(){
      render();
      limpiarFormulario();
    }

    // INICIAL
    render();

</script>
</body>
</html>
