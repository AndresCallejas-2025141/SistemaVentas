<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DetalleVentas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f4f6f9;
  --primary:#10b981;
  --text:#1f2937;
  --border:#e5e7eb;
}

body{font-family:'Poppins';background:var(--bg);}

/* TOP */
.top{
  background:var(--primary);
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.btn-home{
  background:#ffffff;
  color:var(--primary);
  border:2px solid #ffffff;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
}

.btn-home:hover{
  background:#0f766e;
  color:#fff;
  border-color:#0f766e;
  transform:translateY(-1px);
}

.container{padding:20px;}

table{
  width:100%;
  background:#fff;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

tr:hover{background:#f9fafb;}

.form{
  margin-bottom:15px;
}

input{
  padding:8px;
  margin-right:5px;
  border:1px solid var(--border);
  border-radius:6px;
}
</style>
</head>

<body>

<div class="top">
  <h2>Detalle de Ventas</h2>
  <button class="btn-home" onclick="location.href='Home.html'">Principal</button>
</div>

<div class="container">

<div class="form">
  <input id="codigoDetalleVenta" placeholder="Código DV">
  <input id="cantidad" placeholder="Cantidad">
  <input id="precioUnitario" placeholder="Precio Unitario">
  <input id="subTotal" placeholder="Subtotal">
  <input id="codigoProducto" placeholder="Código del Producto">
  <input id="codigoVenta" placeholder="Código de Venta">
  <button class="btn" onclick="agregar()">Agregar</button>
  <button class="btn" onclick="editar()">Editar</button>
  <button class="btn" onclick="eliminar()">Eliminar</button>
  <button class="btn" onclick="actualizar()">Actualizar</button>
</div>

<table>
<thead>
<tr>
  <th>codigo_detalle_venta</th>
  <th>cantidad</th>
  <th>precio_unitario</th>
  <th>subtotal</th>
  <th>productos_codigo_producto</th>
  <th>ventas_codigo_venta</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>
let data = JSON.parse(localStorage.getItem("detalleVentas")) || [];
let indexActual = null;

// Dibuja la tabla
function render(){
  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";
  data.forEach((d,i)=>{
    tabla.innerHTML += `
    <tr onclick="seleccionar(${i})">
      <td>${d.codigoDetalleVenta}</td>
      <td>${d.cantidad}</td>
      <td>${d.precioUnitario}</td>
      <td>${d.subTotal}</td>
      <td>${d.codigoProducto}</td>
      <td>${d.codigoVenta}</td>
    </tr>`;
  });
}

// Guarda en localStorage
function guardar(){
  localStorage.setItem("detalleVentas", JSON.stringify(data));
}

// Limpia los inputs
function limpiarFormulario(){
  document.getElementById("codigoDetalleVenta").value = "";
  document.getElementById("cantidad").value = "";
  document.getElementById("precioUnitario").value = "";
  document.getElementById("subTotal").value = "";
  document.getElementById("codigoProducto").value = "";
  document.getElementById("codigoVenta").value = "";
  indexActual = null;
}

// AGREGAR
function agregar(){
  let codigoDetalleVenta = document.getElementById("codigoDetalleVenta").value;
  let cantidad = document.getElementById("cantidad").value;
  let precioUnitario = document.getElementById("precioUnitario").value;
  let subTotal = document.getElementById("subTotal").value;
  let codigoProducto = document.getElementById("codigoProducto").value;
  let codigoVenta = document.getElementById("codigoVenta").value;

  if(codigoDetalleVenta && cantidad && precioUnitario && subTotal && codigoProducto && codigoVenta){
    data.push({codigoDetalleVenta, cantidad, precioUnitario, subTotal, codigoProducto, codigoVenta});
    guardar(); 
    render();
    limpiarFormulario();
  } else {
    alert("Completa todos los campos");
  }
}

// SELECCIONAR
function seleccionar(i){
  indexActual = i;
  let d = data[i];
  document.getElementById("codigoDetalleVenta").value = d.codigoDetalleVenta;
  document.getElementById("cantidad").value = d.cantidad;
  document.getElementById("precioUnitario").value = d.precioUnitario;
  document.getElementById("subTotal").value = d.subTotal;
  document.getElementById("codigoProducto").value = d.codigoProducto;
  document.getElementById("codigoVenta").value = d.codigoVenta;
}

// EDITAR
function editar(){
  if(indexActual !== null){
    let codigoDetalleVenta = document.getElementById("codigoDetalleVenta").value;
    let cantidad = document.getElementById("cantidad").value;
    let precioUnitario = document.getElementById("precioUnitario").value;
    let subTotal = document.getElementById("subTotal").value;
    let codigoProducto = document.getElementById("codigoProducto").value;
    let codigoVenta = document.getElementById("codigoVenta").value;

    if(codigoDetalleVenta && cantidad && precioUnitario && subTotal && codigoProducto && codigoVenta){
      data[indexActual] = {codigoDetalleVenta, cantidad, precioUnitario, subTotal, codigoProducto, codigoVenta};
      guardar();
      render();
      limpiarFormulario();
    } else {
      alert("Completa todos los campos");
    }
  } else {
    alert("Selecciona un detalle haciendo clic en la tabla");
  }
}

// ELIMINAR
function eliminar(){
  if(indexActual !== null){
    data.splice(indexActual, 1);
    guardar();
    render();
    limpiarFormulario();
  } else {
    alert("Selecciona un detalle haciendo clic en la tabla");
  }
}

// ACTUALIZAR
function actualizar(){
  render();
  limpiarFormulario();
}

// Inicializa la tabla
render();
</script>

</body>
</html>
