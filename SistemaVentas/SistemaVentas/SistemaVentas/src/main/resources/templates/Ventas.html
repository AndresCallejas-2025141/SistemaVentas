<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg: #0f172a;
        --primary: #10b981;
        --primary-dark: #059669;
        --text: #f8fafc;
        --text-light: #94a3b8;
        --card: rgba(255,255,255,0.08);
        --border: rgba(255,255,255,0.15);
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: radial-gradient(circle at top, #1e293b, #0f172a);
        color: var(--text);
    }

    /* TOP */
    .top {
        position: sticky;
        top: 0;

        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 16px 20px;

        background: rgba(16,185,129,0.15);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.1);

        animation: slideDown 0.6s ease;
    }

    /* BOTONES */
    .btn {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;

        border: none;
        padding: 9px 14px;

        border-radius: 10px;

        cursor: pointer;
        margin-right: 6px;

        font-weight: 600;
        font-size: 13px;

        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(16,185,129,0.3);
    }

    /* HOME */
    .btn-home {
        background: transparent;
        color: var(--primary);

        border: 1px solid var(--primary);

        padding: 8px 14px;
        border-radius: 10px;

        font-weight: 600;
        cursor: pointer;

        transition: all 0.3s ease;
    }

    .btn-home:hover {
        background: var(--primary);
        color: white;

        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(16,185,129,0.3);
    }

    /* CONTENEDOR */
    .container {
        padding: 25px;
    }

    /* FORMULARIO */
    .form {
        margin-bottom: 20px;

        display: flex;
        flex-wrap: wrap;
        gap: 10px;

        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);

        padding: 15px;
        border-radius: 16px;

        animation: fadeUp 0.6s ease;
    }

    /* INPUTS */
    input {
        padding: 10px 12px;

        border-radius: 10px;
        border: 1px solid var(--border);

        background: rgba(255,255,255,0.05);
        color: var(--text);

        outline: none;

        transition: all 0.3s ease;
    }

    input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
        transform: translateY(-1px);
    }

    /* TABLA */
    table {
        width: 100%;

        border-collapse: collapse;

        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);

        border-radius: 16px;
        overflow: hidden;

        animation: fadeUp 0.8s ease;
    }

    /* HEADER */
    th {
        text-align: left;
        padding: 12px;

        font-size: 13px;
        color: var(--text-light);

        background: rgba(255,255,255,0.05);
    }

    /* CELDAS */
    td {
        padding: 12px;
        border-top: 1px solid rgba(255,255,255,0.05);

        font-size: 14px;
    }

    /* FILAS */
    tr {
        transition: all 0.2s ease;
        cursor: pointer;
    }

    tr:hover {
        background: rgba(16,185,129,0.08);
        transform: scale(1.01);
    }

    /* ANIMACIONES */
    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
        .form {
            flex-direction: column;
        }

        input {
            width: 100%;
        }
    }
</style>
</head>

<body>

<div class="top">
  <h2>Ventas</h2>
  <button class="btn-home" th:onclick="|window.location.href='@{/home}'|">Principal</button>
</div>

<div class="container">

<div class="form">
  <input id="codigoVenta" placeholder="Código">
  <input id="fechaVenta" placeholder="Fecha">
  <input id="total" placeholder="Total">
  <input id="estado" placeholder="Estado">
  <input id="dpiCliente" placeholder="DPI del Cliente">
  <input id="codigoUsuario" placeholder="Código del Usuario">
  <button class="btn" onclick="agregar()">Agregar</button>
  <button class="btn" onclick="editar()">Editar</button>
  <button class="btn" onclick="eliminar()">Eliminar</button>
  <button class="btn" onclick="actualizar()">Actualizar</button>
</div>

<table>
<thead>
<tr>
  <th>codigo_venta</th>
  <th>fecha_venta</th>
  <th>total</th>
  <th>estado</th>
  <th>clientes_dpi_cliente</th>
  <th>usuarios_codigo_usuario</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

    let indexActual = null;

    // LISTAR
    async function render(){
      let res = await fetch("/api/ventas");
      let data = await res.json();

      let tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data.forEach((v)=>{

        let dpiCliente = v.dpiCliente ?? "";
        let codigoUsuario = v.codigoUsuario ?? "";

        tabla.innerHTML += `
        <tr onclick="seleccionar(
          ${v.codigoVenta},
          '${v.fechaVenta}',
          ${v.total},
          '${v.estado}',
          ${dpiCliente},
          ${codigoUsuario}
        )">
          <td>${v.codigoVenta}</td>
          <td>${v.fechaVenta}</td>
          <td>${v.total}</td>
          <td>${v.estado}</td>
          <td>${dpiCliente}</td>
          <td>${codigoUsuario}</td>
        </tr>`;
      });
    }

    // SELECCIONAR
    function seleccionar(codigoVenta, fechaVenta, total, estado, dpiCliente, codigoUsuario){

      indexActual = codigoVenta;

      document.getElementById("codigoVenta").value = codigoVenta;
      document.getElementById("fechaVenta").value = fechaVenta;
      document.getElementById("total").value = total;
      document.getElementById("estado").value = estado;
      document.getElementById("dpiCliente").value = dpiCliente;
      document.getElementById("codigoUsuario").value = codigoUsuario;
    }

    // LIMPIAR
    function limpiarFormulario(){
      document.getElementById("codigoVenta").value = "";
      document.getElementById("fechaVenta").value = "";
      document.getElementById("total").value = "";
      document.getElementById("estado").value = "";
      document.getElementById("dpiCliente").value = "";
      document.getElementById("codigoUsuario").value = "";
      indexActual = null;
    }

    // AGREGAR
    async function agregar(){

      let venta = {
        fechaVenta: document.getElementById("fechaVenta").value,
        total: document.getElementById("total").value,
        estado: document.getElementById("estado").value,
        dpiCliente: document.getElementById("dpiCliente").value,
        codigoUsuario: document.getElementById("codigoUsuario").value
      };

      await fetch("/api/ventas", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(venta)
      });

      render();
      limpiarFormulario();
    }

    // EDITAR
    async function editar(){

      if(indexActual == null){
        alert("Selecciona una venta");
        return;
      }

      let venta = {
        fechaVenta: document.getElementById("fechaVenta").value,
        total: document.getElementById("total").value,
        estado: document.getElementById("estado").value,
        dpiCliente: document.getElementById("dpiCliente").value,
        codigoUsuario: document.getElementById("codigoUsuario").value
      };

      await fetch(`/api/ventas/${indexActual}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(venta)
      });

      render();
      limpiarFormulario();
    }

    // ELIMINAR
    async function eliminar(){

      if(indexActual == null){
        alert("Selecciona una venta");
        return;
      }

      await fetch(`/api/ventas/${indexActual}`, {
        method: "DELETE"
      });

      render();
      limpiarFormulario();
    }

    // ACTUALIZAR
    function actualizar(){
      render();
      limpiarFormulario();
    }

    // INICIAL
    render();

</script>
</body>
</html>
