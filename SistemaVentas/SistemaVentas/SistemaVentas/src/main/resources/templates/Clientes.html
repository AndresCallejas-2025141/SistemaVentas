<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f4f6f9;
  --primary:#10b981;
  --text:#1f2937;
  --border:#e5e7eb;
}

body{font-family:'Poppins';background:var(--bg);}

/* TOP */
.top{
  background:var(--primary);
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.btn-home{
  background:#ffffff;
  color:var(--primary);
  border:2px solid #ffffff;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
}

.btn-home:hover{
  background:#0f766e;
  color:#fff;
  border-color:#0f766e;
  transform:translateY(-1px);
}

.container{padding:20px;}

table{
  width:100%;
  background:#fff;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

tr:hover{background:#f9fafb;}

.form{
  margin-bottom:15px;
}

input{
  padding:8px;
  margin-right:5px;
  border:1px solid var(--border);
  border-radius:6px;
}
</style>
</head>

<body>

<div class="top">
  <h2>Clientes</h2>
  <button class="btn-home" th:onclick="|window.location.href='@{/home}'|">Principal</button>
</div>

<div class="container">

<div class="form">
  <input id="dpiCliente" placeholder="DPI">
  <input id="nombre" placeholder="Nombre">
  <input id="apellido" placeholder="Apellido">
  <input id="direccion" placeholder="Dirección">
  <input id="estado" placeholder="Estado">
  <button class="btn" onclick="agregar()">Agregar</button>
  <button class="btn" onclick="editar()">Editar</button>
  <button class="btn" onclick="eliminar()">Eliminar</button>
  <button class="btn" onclick="actualizar()">Actualizar</button>
</div>

<table>
<thead>
<tr>
  <th>dpi_cliente</th>
  <th>nombre_cliente</th>
  <th>apellido_cliente</th>
  <th>direccion</th>
  <th>estado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

    let indexActual = null;

    // LISTAR
    async function render(){
      let res = await fetch("/api/clientes");
      let data = await res.json();

      let tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data.forEach((c)=>{
        tabla.innerHTML += `
        <tr onclick="seleccionar(${c.dpiCliente}, '${c.nombreCliente}', '${c.apellidoCliente}', '${c.direccion}', '${c.estado}')">
          <td>${c.dpiCliente}</td>
          <td>${c.nombreCliente}</td>
          <td>${c.apellidoCliente}</td>
          <td>${c.direccion}</td>
          <td>${c.estado}</td>
        </tr>`;
      });
    }

    // SELECCIONAR
    function seleccionar(dpi, nombreCliente, apellidoCliente, direccion, estado){
      indexActual = dpi;

      document.getElementById("dpiCliente").value = dpi;
      document.getElementById("nombre").value = nombreCliente;
      document.getElementById("apellido").value = apellidoCliente;
      document.getElementById("direccion").value = direccion;
      document.getElementById("estado").value = estado;
    }

    // LIMPIAR
    function limpiarFormulario(){
      document.getElementById("dpiCliente").value = "";
      document.getElementById("nombre").value = "";
      document.getElementById("apellido").value = "";
      document.getElementById("direccion").value = "";
      document.getElementById("estado").value = "";
      indexActual = null;
    }

    // AGREGAR
    async function agregar(){
      let cliente = {
        dpiCliente: document.getElementById("dpiCliente").value,
        nombreCliente: document.getElementById("nombre").value,
        apellidoCliente: document.getElementById("apellido").value,
        direccion: document.getElementById("direccion").value,
        estado: document.getElementById("estado").value
      };

      await fetch("/api/clientes", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(cliente)
      });

      render();
      limpiarFormulario();
    }

    // EDITAR
    async function editar(){
      if(indexActual == null){
        alert("Selecciona un cliente");
        return;
      }

      let cliente = {
        dpiCliente: indexActual,
        nombreCliente: document.getElementById("nombre").value,
        apellidoCliente: document.getElementById("apellido").value,
        direccion: document.getElementById("direccion").value,
        estado: document.getElementById("estado").value
      };

      await fetch(`/api/clientes/${indexActual}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(cliente)
      });

      render();
      limpiarFormulario();
    }

    // ELIMINAR
    async function eliminar(){
      if(indexActual == null){
        alert("Selecciona un cliente");
        return;
      }

      await fetch(`/api/clientes/${indexActual}`, {
        method: "DELETE"
      });

      render();
      limpiarFormulario();
    }

    // ACTUALIZAR
    function actualizar(){
      limpiarFormulario();
      render();
    }

    // INICIAL
    render();

</script>
</body>
</html>
