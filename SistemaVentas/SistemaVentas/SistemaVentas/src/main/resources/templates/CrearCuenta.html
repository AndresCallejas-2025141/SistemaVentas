<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SistemaVentas — Crear Cuenta</title>

    <style>
        * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
   }

   :root {
       --bg: #0f172a;
       --card: rgba(255,255,255,0.08);
       --primary: #10b981;
       --primary-dark: #059669;
       --text: #f8fafc;
       --text-light: #94a3b8;
       --border: rgba(255,255,255,0.15);
   }

   body {
       font-family: 'Poppins', sans-serif;
       background: radial-gradient(circle at top, #1e293b, #0f172a);
       color: var(--text);
       height: 100vh;
       display: flex;
   }

   /* CONTAINER */
   .container {
       display: grid;
       grid-template-columns: 1.2fr 1fr;
       width: 100%;
       height: 100vh;
   }

   /* LEFT PANEL */
   .left {
       display: flex;
       flex-direction: column;
       justify-content: center;

       padding: 80px;

       background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(5,150,105,0.05));
       backdrop-filter: blur(10px);

       animation: fadeLeft 0.8s ease;
   }

   .title {
       font-size: 48px;
       font-weight: 800;

       background: linear-gradient(90deg, #10b981, #34d399);
       -webkit-background-clip: text;
       -webkit-text-fill-color: transparent;

       margin-bottom: 10px;
   }

   .desc {
       font-size: 14px;
       color: var(--text-light);
       max-width: 400px;
   }

   /* RIGHT PANEL */
   .right {
       display: flex;
       justify-content: center;
       align-items: center;
   }

   /* CARD */
   .card {
       background: var(--card);
       backdrop-filter: blur(18px);

       border: 1px solid var(--border);

       padding: 45px;
       border-radius: 18px;

       width: 100%;
       max-width: 400px;

       box-shadow: 0 20px 60px rgba(0,0,0,0.4);

       animation: fadeUp 0.8s ease;
   }

   .card h2 {
       margin-bottom: 18px;
       color: white;
   }

   /* FIELDS */
   .field {
       margin-bottom: 18px;
   }

   .field label {
       font-size: 12px;
       color: var(--text-light);
       display: block;
       margin-bottom: 6px;
   }

   .field input {
       width: 100%;
       padding: 12px 14px;

       border-radius: 10px;
       border: 1px solid var(--border);

       background: rgba(255,255,255,0.05);
       color: var(--text);

       outline: none;

       transition: all 0.3s ease;
   }

   .field input:focus {
       border-color: var(--primary);
       box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
       transform: translateY(-2px);
   }

   /* BUTTON */
   .btn {
       width: 100%;
       padding: 13px;

       background: linear-gradient(135deg, var(--primary), var(--primary-dark));
       color: white;

       border: none;
       border-radius: 10px;

       font-weight: 600;
       cursor: pointer;

       margin-top: 10px;

       transition: all 0.3s ease;
   }

   .btn:hover {
       transform: translateY(-3px);
       box-shadow: 0 10px 25px rgba(16,185,129,0.4);
   }

   /* LINK */
   .roles {
       margin-top: 25px;
       text-align: center;
       font-size: 12px;
       color: var(--text-light);
   }

   .roles a {
       color: var(--primary);
       text-decoration: none;
       font-weight: 600;
   }

   .roles a:hover {
       text-decoration: underline;
   }

   /* ANIMATIONS */
   @keyframes fadeUp {
       from {
           opacity: 0;
           transform: translateY(30px);
       }
       to {
           opacity: 1;
           transform: translateY(0);
       }
   }

   @keyframes fadeLeft {
       from {
           opacity: 0;
           transform: translateX(-40px);
       }
       to {
           opacity: 1;
           transform: translateX(0);
       }
   }

   /* RESPONSIVE */
   @media (max-width: 800px) {
       .container {
           grid-template-columns: 1fr;
       }

       .left {
           display: none;
       }
   }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="title">SistemaVentas</div>
        <div class="desc">Regístrate y crea un nuevo usuario</div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="card">
            <h2>Crear Cuenta</h2>

            <!-- FORMULARIO -->
            <form th:action="@{/registro}" method="post" onsubmit="redirigirLogin()">

                <div class="field">
                    <label>Usuario</label>
                    <input type="text" name="username" placeholder="Elige un nombre de usuario" required>
                </div>

                <div class="field">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="Crea tu contraseña" required>
                </div>

                <button type="submit" class="btn">
                    Crear Cuenta
                </button>

            </form>

            <!-- LINK VOLVER AL LOGIN -->
            <div class="roles">
                <a th:href="@{/login}">¿Ya tienes cuenta? Inicia sesión</a>
            </div>

        </div>
    </div>

</div>

<script>
    function redirigirLogin(){
        setTimeout(() => {
            window.location.href = "/login";
        }, 500);
    }
</script>

</body>
</html>
