<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SistemaVentas — Crear Cuenta</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --primary: #10b981;
      --primary-dark: #059669;
      --text: #1f2937;
      --text-light: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
    }

    .left {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
    }

    .title {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .desc {
      font-size: 14px;
      opacity: 0.9;
      max-width: 400px;
    }

    .right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: var(--card);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-bottom: 10px;
      color: var(--text);
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      font-size: 12px;
      color: var(--text-light);
      display: block;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 14px;
    }

    .field input:focus {
      border-color: var(--primary);
    }

    .forgot {
      font-size: 12px;
      text-align: right;
      display: block;
      margin-top: 5px;
      color: var(--primary);
      text-decoration: none;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .roles {
      margin-top: 25px;
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
    }

    @media (max-width: 800px) {
      .container {
        grid-template-columns: 1fr;
      }
      .left {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="title">SistemaVentas</div>
    <div class="desc">Registrate y crea un nuevo usuario</div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="card">
      <h2>Crear Cuenta</h2>

      <div class="field">
        <label>Usuario</label>
        <input type="text" id="usuario" placeholder="Elige un nombre de usuario">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="contraseña" placeholder="Crea tu contraseña">
      </div>

      <div class="field">
        <label>Confirmar Contraseña</label>
        <input type="password" id="confirmar" placeholder="Confirma tu contraseña">
      </div>

      <button class="btn" onclick="crearCuenta()">
        Crear Cuenta
      </button>

      <a href="Login.html" class="forgot">Ya tengo cuenta</a>

      <div class="roles">
        Administrador · Vendedor
      </div>

    </div>
  </div>

</div>

<script>
function crearCuenta() {
  const usuario = document.getElementById('usuario').value.trim();
  const contraseña = document.getElementById('contraseña').value.trim();
  const confirmar = document.getElementById('confirmar').value.trim();

  if (!usuario || !contraseña || !confirmar) {
    alert("Todos los campos deben estar llenos");
    return;
  }

  if (contraseña !== confirmar) {
    alert("Las contraseñas no coinciden");
    return;
  }

  window.location.href = 'Login.html';
}
</script>

</body>
</html>
